version: '3.8'

# Mixed cluster configuration for testing C and Rust pmxcfs interoperability
# Node 1: Rust pmxcfs
# Node 2: Rust pmxcfs
# Node 3: C pmxcfs (legacy)

services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    image: pmxcfs-test:latest
    container_name: pmxcfs-mixed-node1
    hostname: node1
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      - /dev/fuse
    volumes:
      - ../../../../:/workspace:ro
      - ../results:/test/results
      - node1-data:/test/db
      - mixed-cluster-config:/etc/corosync
    networks:
      pmxcfs-mixed:
        ipv4_address: 172.21.0.11
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - NODE_NAME=node1
      - NODE_ID=1
      - PMXCFS_TYPE=rust
      - CLUSTER_TYPE=mixed
    healthcheck:
      test: ["CMD-SHELL", "pgrep pmxcfs > /dev/null && test -d /test/pve"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    stop_grace_period: 3s

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    image: pmxcfs-test:latest
    container_name: pmxcfs-mixed-node2
    hostname: node2
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      - /dev/fuse
    volumes:
      - ../../../../:/workspace:ro
      - ../results:/test/results
      - node2-data:/test/db
      - mixed-cluster-config:/etc/corosync
    networks:
      pmxcfs-mixed:
        ipv4_address: 172.21.0.12
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - NODE_NAME=node2
      - NODE_ID=2
      - PMXCFS_TYPE=rust
      - CLUSTER_TYPE=mixed
    healthcheck:
      test: ["CMD-SHELL", "pgrep pmxcfs > /dev/null && test -d /test/pve"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    stop_grace_period: 3s

  node3:
    build:
      context: .
      dockerfile: Dockerfile
    image: pmxcfs-test:latest
    container_name: pmxcfs-mixed-node3
    hostname: node3
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      - /dev/fuse
    volumes:
      - ../../../../:/workspace:ro
      - ../results:/test/results
      - node3-data:/test/db
      - mixed-cluster-config:/etc/corosync
    networks:
      pmxcfs-mixed:
        ipv4_address: 172.21.0.13
    environment:
      - NODE_NAME=node3
      - NODE_ID=3
      - PMXCFS_TYPE=c
      - CLUSTER_TYPE=mixed
    healthcheck:
      test: ["CMD-SHELL", "pgrep pmxcfs > /dev/null && test -d /etc/pve"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

networks:
  pmxcfs-mixed:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  node1-data:
  node2-data:
  node3-data:
  mixed-cluster-config:
