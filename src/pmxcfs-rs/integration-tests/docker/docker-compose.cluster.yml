services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    image: pmxcfs-test:latest
    container_name: pmxcfs-cluster-node1
    hostname: node1
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      - /dev/fuse
    volumes:
      - ../../../../:/workspace:ro
      - ../results:/test/results
      - node1-data:/test/db
      - cluster-config:/etc/corosync
    networks:
      pmxcfs-cluster:
        ipv4_address: 172.20.0.11
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - NODE_NAME=node1
      - NODE_ID=1
      - CLUSTER_TYPE=cluster
    healthcheck:
      test: ["CMD-SHELL", "pgrep pmxcfs > /dev/null && test -d /test/pve"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  node2:
